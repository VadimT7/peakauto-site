name: Refresh stock from 999.md

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh-stock
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Scrape 999.md and rebuild data
        run: |
          python3 tools/scrape_ads.py
          python3 tools/build_data.py

      - name: Commit if stock changed
        run: |
          git config user.name "peakauto-bot"
          git config user.email "actions@users.noreply.github.com"
          git add js/cars-data.js data/ads_list.json data/cars_full.json
          if git diff --cached --quiet; then
            echo "No stock changes."
          else
            git commit -m "bot: refresh stock from 999.md"
            git push
          fi
